name: Scheduled Notifications Heartbeat

on:
  schedule:
    # Roda a cada hora cheia
    - cron: '0 * * * *'
  workflow_dispatch: # Permite disparar manualmente para testar

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Notification Processing
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://dashboard-suzano.vercel.app/api/notifications/process-scheduled
