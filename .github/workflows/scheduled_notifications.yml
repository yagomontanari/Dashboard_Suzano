name: Scheduled Notifications Heartbeat

on:
  schedule:
    # Roda a cada hora cheia
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL do backend para disparar (opcional)'
        required: false
        default: 'https://dashboard-suzano.vercel.app'

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Notification Processing
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            ${{ github.event.inputs.target_url || 'https://dashboard-suzano.vercel.app' }}/api/notifications/process-scheduled
