
services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: suzano_backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: suzano_frontend
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Monitoramento de Logs via Web
  logs:
    image: amir20/dozzle:latest
    container_name: suzano_logs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8889:8080"
    restart: always
